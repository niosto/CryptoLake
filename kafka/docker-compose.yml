  #     ports:
  #       - "27017:27017"
  #     environment:
  #       MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-cryptolake}
  #       MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-cryptolake123}
  #       MONGO_INITDB_DATABASE: cryptolake
  #     volumes:
  #       - mongo_data:/data/db
  #     healthcheck:
  #       test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
  #       interval: 10s
  #       timeout: 5s
  #       retries: 5

  producer:
    build: ./producer
    container_name: cryptolake-producer
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:29092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-crypto-prices}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-30}
    restart: on-failure

